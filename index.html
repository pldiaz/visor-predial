<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visor Predial</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>

</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="titulo">Visor Predial AVP</div>

    <div class="filtros">
      <input type="text" id="buscarCodigo" placeholder="Buscar CODIGO...">
      <button id="btnLimpiar">Limpiar</button>
    </div>
  </div>

  <!-- MAPA -->
  <div id="map"></div>

  <!-- LEYENDA -->
  <div class="leyenda">
    <b>Leyenda</b><br>
    <div><span class="color verde"></span> Liberado / Custodia</div>
    <div><span class="color amarillo"></span> En proceso</div>
    <div><span class="color rojo"></span> Pendiente</div>
    <div><span class="color gris"></span> Otros</div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>

</body>
</html>
